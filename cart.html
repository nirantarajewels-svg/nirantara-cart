<!DOCTYPE html>
<html>
<head>
<title>Nirantara Jewels</title>

<style>

body{
font-family: Georgia, serif;
padding:40px;
max-width:800px;
margin:auto;
background:#fcfaf7;
color:#4a4036;
}

.box{
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
border:1px solid #f1e8da;
}

h2{
text-align:center;
font-size:32px;
font-weight:normal;
color:#b08d57;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:15px;
color:#8c7b6a;
margin-bottom:35px;
font-style:italic;
}

button{
border:none;
padding:16px;
width:100%;
font-size:17px;
cursor:pointer;
margin-top:18px;
border-radius:10px;
transition:0.3s ease;
font-family: Arial;
}

.whatsapp-btn{
background:#b08d57;
color:white;
}

.whatsapp-btn:hover{
opacity:0.9;
}

.clear-btn{
background:#eee6db;
color:#6d5d4b;
}

.clear-btn:hover{
background:#e4d7c6;
}

li{
list-style:none;
margin:18px 0;
padding:18px;
background:#faf7f2;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #f0e5d6;
}

.item-row{
flex-grow:1;
font-size:18px;
line-height:1.6;
}

.price{
font-weight:bold;
color:#b8860b;
font-size:19px;
}

.remove-btn{
background:#f8efe4;
color:#9c7a45;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-size:14px;
width:auto;
margin-left:20px;
}

.remove-btn:hover{
background:#f2e3d1;
}

.total-box{
margin-top:30px;
padding-top:20px;
border-top:1px solid #e8dccb;
font-size:24px;
font-weight:bold;
text-align:right;
color:#b08d57;
}

.empty{
text-align:center;
color:#999;
font-size:18px;
padding:20px;
}

.footer-note{
text-align:center;
margin-top:25px;
font-size:14px;
font-style:italic;
color:#8c7b6a;
line-height:1.8;
}

</style>
</head>

<body>

<div class="box">

<h2>Your Curated Collection ✨</h2>

<p class="subtitle">
Each Nirantara piece is thoughtfully crafted to bring timeless elegance to your collection.
</p>

<ul id="list"></ul>

<div id="emptyMessage"></div>

<div id="totalAmount"></div>

<button class="whatsapp-btn" onclick="sendWhatsapp()">
Reserve on WhatsApp ✨
</button>

<button class="clear-btn" onclick="clearCart()">
Reset Collection
</button>

<div class="footer-note">
Handcrafted with elegance, made to stay timeless 💎
</div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("nirantara")) || [];

let list = document.getElementById("list");
let emptyMessage = document.getElementById("emptyMessage");
let totalAmount = document.getElementById("totalAmount");

/* render cart */

function renderCart(){

list.innerHTML = "";
emptyMessage.innerHTML = "";
totalAmount.innerHTML = "";

let total = 0;

if(items.length === 0){

emptyMessage.innerHTML =
"<p class='empty'>No treasures selected yet ✨</p>";

return;

}

items.forEach((item,index)=>{

let li = document.createElement("li");

li.innerHTML = `
<div class="item-row">
${item.name}<br>
<span class="price">₹${item.price}</span>
</div>

<button class="remove-btn" onclick="removeItem(${index})">✕</button>
`;

list.appendChild(li);

total += Number(item.price);

});

totalAmount.innerHTML =
"<div class='total-box'>Total Amount: ₹" + total + "</div>";

}

/* remove item */

function removeItem(index){

items.splice(index,1);

localStorage.setItem("nirantara", JSON.stringify(items));

renderCart();

}

/* whatsapp */

function sendWhatsapp(){

if(items.length === 0){

alert("Please add products first ✨");

return;

}

let total = 0;

let msg = "✨ Hello Nirantara Jewels,%0A%0AI would like to reserve:%0A%0A";

items.forEach((item,index)=>{

msg += (index+1)+". " + item.name + " - ₹" + item.price + "%0A";

total += Number(item.price);

});

msg += "%0ATotal Amount: ₹" + total + "%0A";
msg += "%0ALooking forward to hearing from you 💎";

window.location.href =
"https://wa.me/917483923808?text="+msg;

}

/* clear cart */

function clearCart(){

localStorage.removeItem("nirantara");

alert("Your curated collection has been reset ✨");

location.reload();

}

/* load */

renderCart();

</script>

</body>
</html>
