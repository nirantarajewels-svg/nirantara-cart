<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:0;
background:transparent;
overflow:hidden;
}

.ticker-wrap{
width:100%;
overflow:hidden;
white-space:nowrap;
padding:10px 0;
}

.ticker{
display:inline-block;
padding-left:100%;
font-family:Arial,sans-serif;
font-size:42px;
font-weight:700;
color:black;
animation:scroll 18s linear infinite;
}

/* MOBILE VIEW */

@media only screen and (max-width:768px){

.ticker{

font-size:20px;

}

}

@keyframes scroll{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-100%);
}

}

</style>
</head>

<body>

<div class="ticker-wrap">
<div class="ticker">

👇 Jewellery So Loved, It Keeps Selling Out 👇

</div>
</div>

</body>
</html>
